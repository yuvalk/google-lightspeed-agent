{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lightspeed-agent.fullname" . }}-secrets
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  GOOGLE_API_KEY: {{ required "secrets.googleApiKey is required" .Values.secrets.googleApiKey | quote }}
  GOOGLE_CLOUD_PROJECT: {{ .Values.secrets.googleCloudProject | quote }}
  RED_HAT_SSO_CLIENT_ID: {{ required "secrets.redHatSsoClientId is required" .Values.secrets.redHatSsoClientId | quote }}
  RED_HAT_SSO_CLIENT_SECRET: {{ required "secrets.redHatSsoClientSecret is required" .Values.secrets.redHatSsoClientSecret | quote }}
  SESSION_DB_PASSWORD: {{ required "secrets.sessionDbPassword is required" .Values.secrets.sessionDbPassword | quote }}
  SESSION_DATABASE_URL: {{ required "secrets.sessionDatabaseUrl is required" .Values.secrets.sessionDatabaseUrl | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  DCR_INITIAL_ACCESS_TOKEN: {{ .Values.secrets.dcrInitialAccessToken | quote }}
  DCR_ENCRYPTION_KEY: {{ .Values.secrets.dcrEncryptionKey | quote }}
{{- end }}

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "lightspeed-agent.fullname" . }}-postgresql-data
  labels:
    {{- include "lightspeed-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresql.storage.size }}
  {{- if .Values.postgresql.storage.storageClassName }}
  storageClassName: {{ .Values.postgresql.storage.storageClassName | quote }}
  {{- end }}
